<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 id="title">DOM Practice Project</h1>
    <!-- Content Manipulation -->
    <div class="box" id="contentBox">
        Original Content
    </div>

    <!-- Attribute Manipulation -->
    <img id="myImage" src="web.jpg" alt="Sample Image">
    <hr>

    <!-- List for querySelectorAll and getElementsByClassName -->
    <p class="demo">Paragraph 1</p>
    <p class="demo">Paragraph 2</p>
    <p class="demo">Paragraph 3</p>
    <hr>


    <h2>To-Do List</h2>
    <input type="text" id="taskInput" placeholder="Enter Task">
    <button id="addTaskBtn">Add Task</button>
    <ul id="taskList"></ul>
    <hr>


    <h2>Character Counter</h2>
    <textarea id="messageBox" placeholder="Start typing..."></textarea>
    <p>Characters:<span id="charCount">0</span></p>

    
    <script src="script.js"></script>

</body>
</html>
